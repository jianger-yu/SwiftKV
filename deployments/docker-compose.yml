version: '3.8'

# ============================================================
# KVraft 集群部署配置
# 支持：3 节点 Raft 集群、gRPC 服务、Prometheus 监控
# ============================================================

services:
  # 配置中心和服务注册
  consul:
    image: consul:1.15
    container_name: kvraft-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    networks:
      - kvraft-net

  # Prometheus 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: kvraft-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - kvraft-node-0
      - kvraft-node-1
      - kvraft-node-2
    networks:
      - kvraft-net

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: kvraft-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kvraft-net

  # ============================================================
  # KVraft Raft 集群节点 (3 节点)
  # ============================================================

  # Node 0 - Raft Group 0
  kvraft-node-0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvraft-node-0
    environment:
      - NODE_ID=0
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50001,kvraft-node-2:50002
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50000:50000"  # Raft 通信端口
      - "6000:6000"    # gRPC 端口
      - "8001:8001"    # REST API 端口（可选旧接口）
      - "9100:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-0:/data
    depends_on:
      - consul
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Node 1 - Raft Group 0
  kvraft-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvraft-node-1
    environment:
      - NODE_ID=1
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50001,kvraft-node-2:50002
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50001:50000"  # Raft 通信端口
      - "6001:6000"    # gRPC 端口
      - "8002:8001"    # REST API 端口
      - "9101:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-1:/data
    depends_on:
      - consul
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Node 2 - Raft Group 0
  kvraft-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvraft-node-2
    environment:
      - NODE_ID=2
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50001,kvraft-node-2:50002
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50002:50000"  # Raft 通信端口
      - "6002:6000"    # gRPC 端口
      - "8003:8001"    # REST API 端口
      - "9102:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-2:/data
    depends_on:
      - consul
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # 性能测试工具
  # ============================================================

  # Redis 基准测试服务器（用于对比）
  redis:
    image: redis:7-alpine
    container_name: kvraft-redis
    ports:
      - "6379:6379"
    networks:
      - kvraft-net
    command: redis-server --appendonly yes --appendfsync everysec

  # Benchmark 客户端容器
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    container_name: kvraft-benchmark
    environment:
      - TARGET_NODES=kvraft-node-0:6000,kvraft-node-1:6001,kvraft-node-2:6002
      - BENCHMARK_TYPE=write  # read, write, mixed
      - NUM_CLIENTS=10
      - NUM_REQUESTS=10000
      - REDIS_ADDR=redis:6379
    depends_on:
      - kvraft-node-0
      - kvraft-node-1
      - kvraft-node-2
      - redis
    networks:
      - kvraft-net
    profiles:
      - benchmark  # 启动 benchmark: docker-compose --profile benchmark up

# ============================================================
# 网络配置
# ============================================================

networks:
  kvraft-net:
    driver: bridge

# ============================================================
# 数据卷配置
# ============================================================

volumes:
  kvraft-data-0:
    driver: local
  kvraft-data-1:
    driver: local
  kvraft-data-2:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
